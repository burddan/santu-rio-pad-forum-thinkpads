<input type="checkbox" class="hidden" id="mainmenu" name="mainmenu"/>
<header>
  <div id="bgright"></div>
  <nav>
    <label for="mainmenu">Menu</label>
    <menu></menu>
  </nav>
</header>
<nav>
  <article>
    <h2>ThinkPad Archive</h2>
    <div>
      <a href="/">Home</a>
      <br/>
      <a href="/g">TimeLine</a>
      <br/>
      <a href="/p">Mods</a>
      <br/>
      <a href="/s">Forum</a>
      <br/>
    </div>
  </article>
  <article>
    <h2>User menu</h2>
    <div id="user-menu">
      <a href="/u/login">Login</a>
      <br/>
      <a href="/u/register">Register</a>
    </div>
  </article>
</nav>

<script>
  fetch('/me')
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        document.getElementById('user-menu').innerHTML =
          '<span>' + data.message + '</span><br/>' +
          '<a href="#" id="btnLogout">Logout</a>';
        document.getElementById('btnLogout').addEventListener('click', function(e) {
          e.preventDefault();
          fetch('/logout', { method: 'POST' })
            .then(() => window.location.href = '/');
        });
      }
    })
    .catch(function() {});
</script>
